<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#E8F4F8" stroke="#2ECC71" stroke-width="2"/>
  
  <!-- Nucleus -->
  <circle cx="50" cy="50" r="8" fill="#2ECC71"/>
  
  <!-- Electron orbits -->
  <ellipse cx="50" cy="50" rx="22" ry="10" fill="none" stroke="#2ECC71" stroke-width="2" transform="rotate(0 50 50)"/>
  <ellipse cx="50" cy="50" rx="22" ry="10" fill="none" stroke="#2ECC71" stroke-width="2" transform="rotate(60 50 50)"/>
  <ellipse cx="50" cy="50" rx="22" ry="10" fill="none" stroke="#2ECC71" stroke-width="2" transform="rotate(120 50 50)"/>
  
  <!-- Electrons -->
  <circle cx="72" cy="50" r="4" fill="#2ECC71"/>
  <circle cx="35" cy="60" r="4" fill="#2ECC71"/>
  <circle cx="35" cy="40" r="4" fill="#2ECC71"/>
</svg>