<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#E8F4F8" stroke="#4A90E2" stroke-width="2"/>
  
  <!-- Calculator/Math symbol -->
  <rect x="30" y="30" width="40" height="40" fill="none" stroke="#4A90E2" stroke-width="2" rx="3"/>
  
  <!-- Division lines -->
  <line x1="50" y1="30" x2="50" y2="70" stroke="#4A90E2" stroke-width="2"/>
  <line x1="30" y1="50" x2="70" y2="50" stroke="#4A90E2" stroke-width="2"/>
  
  <!-- Numbers -->
  <circle cx="38" cy="38" r="2" fill="#4A90E2"/>
  <circle cx="62" cy="38" r="2" fill="#4A90E2"/>
  <circle cx="38" cy="62" r="2" fill="#4A90E2"/>
  <circle cx="62" cy="62" r="2" fill="#4A90E2"/>
</svg>