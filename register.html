<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Đăng Ký - StudyHub</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        <link rel="stylesheet" href="style.css">
        <script defer src="analytics-config.js"></script>
        <script defer src="analytics.js"></script>
        
        <!-- Supabase Client Library -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    </head>

    <body>
        <section id="header">
            <a href="#"><img src="img/logo.png" class="logo" alt=""></a>

            <div>
                <ul id="navbar">
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="shop.html">Cửa hàng</a></li>
                    <li><a href="orders.html">Đơn hàng</a></li>
                    <li><a href="blog.html">Bài viết</a></li>
                    <li><a href="about.html">Giới thiệu</a></li>
                    <li><a href="contact.html">Liên hệ</a></li>
                    <li id="lg-bag"><a href="cart.html"><i class="fa fa-shopping-bag"></i></a></li>
                    <li id="lg-bag"><a class="active" href="login.html"><i class="fa fa-user"></i></a></li>
                    <a href="#" id="close"><i class="fa fa-times"></i></a>
                </ul>
            </div>

            <div id="mobile">
                <a href="cart.html"><i class="fa fa-shopping-bag"></i></a>
                <a href="login.html"><i class="fa fa-user"></i></a>
                <i id="bar" class="fas fa-outdent"></i>
            </div>
        </section>

        <section id="register">
            <div class="login-container">
                <div class="login-form">
                    <h2>Đăng ký</h2>
                    <form id="register-form">
                        <div class="input-box">
                            <span class="icon"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" required>
                            <label>Tên đăng nhập</label>
                        </div>
                        <div class="input-box">
                            <span class="icon"><i class="fas fa-envelope"></i></span>
                            <input type="email" name="email" required>
                            <label>Email</label>
                        </div>
                        <div class="input-box">
                            <span class="icon"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" required>
                            <label>Mật khẩu</label>
                        </div>

                        <div class="input-box">
                            <span class="icon"><i class="fas fa-lock"></i></span>
                            <input type="password" name="confirmPassword" required>
                            <label>Nhập lại mật khẩu</label>
                        </div>

                        <button type="submit" class="login-btn" id="register-btn">Đăng ký</button>

                        <div class="register">
                            <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
                        </div>
                        
                        <div class="divider">hoặc</div>
                        <div class="icon-container">
                            <a href="#" class="btn-icon" title="Đăng ký với Google">
                                <i class="fab fa-google"></i>
                            </a>
                            <a href="#" class="btn-icon" title="Đăng ký với Apple">
                                <i class="fab fa-apple"></i>
                            </a>
                            <a href="#" class="btn-icon" title="Đăng ký với Facebook">
                                <i class="fab fa-facebook-f"></i>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <!-- Supabase Configuration -->
        <script src="supabase-config.js"></script>
        <script src="auth.js"></script>
        <script src="script.js"></script>

        <!-- Register Script -->
        <script>
            document.getElementById('register-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const form = document.querySelector('#register-form');
                const username = form.querySelector('input[name="username"]').value;
                const email = form.querySelector('input[name="email"]').value;
                const password = form.querySelector('input[name="password"]').value;
                const confirmPassword = form.querySelector('input[name="confirmPassword"]').value;

                if (!username || !email || !password) {
                    alert('Vui lòng nhập đầy đủ thông tin!');
                    return;
                }

                if (password !== confirmPassword) {
                    alert('Mật khẩu xác nhận không khớp!');
                    return;
                }

                const result = await registerUser(username, email, password);
                
                if (result.success) {
                    alert(result.message);
                    window.location.href = 'login.html';
                } else {
                    alert('Lỗi: ' + result.message);
                }
            });
        </script>
    </body>

</html>
